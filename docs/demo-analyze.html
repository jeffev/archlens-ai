<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archlens-ai — shopflow-api (demo)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', ui-sans-serif, system-ui; background: #060b18; color: #e2e8f0; -webkit-font-smoothing: antialiased; }
    code { font-family: 'JetBrains Mono', monospace; }

    .tab-btn { padding: 5px 13px; border-radius: 6px; font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; transition: all .15s; background: none; color: #475569; position: relative; }
    .tab-btn.active { background: rgba(99,102,241,.15); color: #a5b4fc; border-color: rgba(99,102,241,.4); }
    .tab-btn:not(.active):hover { color: #94a3b8; background: rgba(255,255,255,.04); }
    .badge-count { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: #6366f1; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }

    .panel-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1e293b transparent; }
    .panel-scroll::-webkit-scrollbar { width: 3px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .list-row { width: 100%; display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; background: none; border: none; cursor: pointer; text-align: left; transition: background .15s; }
    .list-row:hover, .list-row.sel { background: rgba(255,255,255,.04); }

    .score-bar-track { height: 4px; border-radius: 2px; background: #0f172a; flex: 1; overflow: hidden; }
    .score-bar-fill  { height: 100%; border-radius: 2px; }

    .chip { padding: 3px 10px; background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; font-size: 12px; color: #94a3b8; }

    #cy { width: 100%; height: 100%; }
    .view { display: none; }
    .view.active { display: flex; }

    .demo-banner {
      background: rgba(99,102,241,.12); border-bottom: 1px solid rgba(99,102,241,.25);
      padding: 6px 16px; font-size: 12px; color: #818cf8; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
  </style>
</head>
<body style="display:flex;flex-direction:column;height:100%;">

  <!-- DEMO BANNER -->
  <div class="demo-banner">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    This is a live demo generated by archlens-ai on a fictional Node.js e-commerce API.
    <a href="https://github.com/jeffev/archlens-ai" style="color:#a5b4fc;text-decoration:underline;margin-left:auto;">Get archlens-ai →</a>
  </div>

  <!-- HEADER -->
  <header style="flex-shrink:0;height:52px;border-bottom:1px solid #0f172a;padding:0 16px;display:flex;align-items:center;gap:14px;background:#080d1a;">
    <div style="display:flex;align-items:center;gap:7px;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect width="22" height="22" rx="6" fill="#6366f1"/><path d="M6 11L11 6L16 11L11 16Z" stroke="white" stroke-width="1.5" fill="none"/><circle cx="11" cy="11" r="2" fill="white"/></svg>
      <span style="font-weight:600;font-size:14px;color:#e2e8f0;letter-spacing:-.3px;">archlens-ai</span>
    </div>
    <div style="font-size:12px;">
      <span style="color:#94a3b8;font-weight:500;">shopflow-api</span>
      <span style="margin:0 5px;color:#0f172a;">·</span>
      <span style="color:#4f46e5;">Node.js</span>
    </div>
    <nav style="display:flex;gap:3px;">
      <button class="tab-btn active" onclick="switchTab('sistema')" id="tab-sistema">Sistema</button>
      <button class="tab-btn" onclick="switchTab('current')" id="tab-current">Estado Atual</button>
      <button class="tab-btn" onclick="switchTab('suggested')" id="tab-suggested">Sugerido</button>
      <button class="tab-btn" onclick="switchTab('diff')" id="tab-diff">Diff<span class="badge-count">4</span></button>
      <button class="tab-btn" onclick="switchTab('ciclos')" id="tab-ciclos">Ciclos<span class="badge-count">1</span></button>
      <button class="tab-btn" onclick="switchTab('qualidade')" id="tab-qualidade">Qualidade<span class="badge-count" style="background:#ef4444;">3</span></button>
    </nav>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
      <div style="font-size:11px;color:#475569;">Health score</div>
      <div style="font-size:15px;font-weight:700;color:#f59e0b;">72<span style="font-size:10px;color:#475569;">/100</span></div>
    </div>
  </header>

  <!-- SISTEMA TAB -->
  <div id="view-sistema" class="view active" style="flex:1;overflow:hidden;position:relative;">
    <div id="cy" style="position:absolute;inset:0;"></div>
    <!-- Side panel -->
    <div id="sys-panel" style="position:absolute;right:0;top:0;bottom:0;width:300px;background:#080d1a;border-left:1px solid #0f172a;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s;">
      <div style="padding:14px 14px 10px;border-bottom:1px solid #0f172a;display:flex;align-items:center;justify-content:space-between;">
        <span id="panel-title" style="font-size:13px;font-weight:600;color:#e2e8f0;"></span>
        <button onclick="closePanel()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:16px;">×</button>
      </div>
      <div id="panel-body" class="panel-scroll" style="flex:1;padding:14px;font-size:12.5px;color:#64748b;line-height:1.65;"></div>
    </div>
  </div>

  <!-- ESTADO ATUAL TAB -->
  <div id="view-current" class="view" style="flex:1;overflow:hidden;display:flex;">
    <div class="panel-scroll" style="width:240px;flex-shrink:0;border-right:1px solid #0f172a;padding:10px 8px;" id="module-list"></div>
    <div id="module-detail" class="panel-scroll" style="flex:1;padding:20px 24px;"></div>
  </div>

  <!-- SUGERIDO TAB -->
  <div id="view-suggested" class="view" style="flex:1;overflow:hidden;position:relative;">
    <div id="cy2" style="position:absolute;inset:0;"></div>
  </div>

  <!-- DIFF TAB -->
  <div id="view-diff" class="view" style="flex:1;overflow:hidden;">
    <div class="panel-scroll" style="height:100%;padding:20px 24px;display:flex;flex-direction:column;gap:12px;" id="diff-list"></div>
  </div>

  <!-- CICLOS TAB -->
  <div id="view-ciclos" class="view" style="flex:1;overflow:hidden;">
    <div class="panel-scroll" style="height:100%;padding:20px 24px;" id="ciclos-content"></div>
  </div>

  <!-- QUALIDADE TAB -->
  <div id="view-qualidade" class="view" style="flex:1;overflow:hidden;">
    <div class="panel-scroll" style="height:100%;padding:20px 24px;" id="qual-content"></div>
  </div>

<script>
const MODULES = [
  { id:'auth',    name:'AuthModule',    score:82, color:'#10b981', responsibilities:['JWT issuance & refresh','OAuth2 social login','Password reset flow','Session management'], cohesion:85, coupling:30, size:72, deps:['UserModule'], files:['src/auth/auth.controller.ts','src/auth/auth.service.ts','src/auth/strategies/jwt.strategy.ts'] },
  { id:'orders',  name:'OrdersModule',  score:41, color:'#ef4444', responsibilities:['Order lifecycle management','Payment orchestration','Inventory deduction','Email notifications','PDF invoice generation'], cohesion:38, coupling:87, size:145, deps:['PaymentsModule','InventoryModule','NotificationsModule'], files:['src/orders/orders.service.ts','src/orders/orders.controller.ts','src/orders/invoice.service.ts'] },
  { id:'products',name:'ProductsModule',score:74, color:'#6366f1', responsibilities:['Product catalog CRUD','Category management','Price rules','Image upload'], cohesion:78, coupling:22, size:84, deps:['StorageModule'], files:['src/products/products.service.ts','src/products/products.controller.ts'] },
  { id:'payments',name:'PaymentsModule',score:69, color:'#f59e0b', responsibilities:['Stripe charge & refund','Webhook verification','Payment status sync'], cohesion:72, coupling:45, size:61, deps:['OrdersModule'], files:['src/payments/payments.service.ts','src/payments/stripe.webhook.ts'] },
  { id:'notif',   name:'NotificationsModule', score:78, color:'#14b8a6', responsibilities:['Email via SendGrid','Push via Firebase','SMS via Twilio','Template rendering'], cohesion:74, coupling:18, size:53, deps:[], files:['src/notifications/email.service.ts','src/notifications/push.service.ts'] },
  { id:'inventory',name:'InventoryModule',score:66, color:'#a855f7', responsibilities:['Stock tracking','Reserve on checkout','Release on cancel','Reorder alerts'], cohesion:70, coupling:38, size:47, deps:['NotificationsModule'], files:['src/inventory/inventory.service.ts'] },
]

const NODES = [
  { id:'nodejs', label:'Node.js\n(Fastify)', type:'runtime',  color:'#10b981', desc:'API runtime — 247 routes across 6 modules', issues:['No request timeout middleware configured'], suggestions:['Add @fastify/rate-limit to all public endpoints'] },
  { id:'pg',     label:'PostgreSQL',        type:'database', color:'#3b82f6', desc:'Primary datastore — 18 tables, 4 schemas', issues:['Missing indexes on orders.created_at, orders.status'], suggestions:['Add composite index on (user_id, status, created_at)'] },
  { id:'redis',  label:'Redis',             type:'cache',    color:'#ef4444', desc:'Session store & job queue', issues:['No TTL configured on session keys'], suggestions:['Set SESSION_TTL=86400 in Redis config'] },
  { id:'stripe', label:'Stripe',            type:'external', color:'#6366f1', desc:'Payment processing & webhook receiver', issues:[], suggestions:['Enable Stripe Radar for fraud detection'] },
  { id:'sendgrid',label:'SendGrid',         type:'external', color:'#14b8a6', desc:'Transactional email delivery', issues:['No bounce/complaint webhook handler'], suggestions:['Implement unsubscribe flow via bounce events'] },
  { id:'docker', label:'Docker',            type:'infra',    color:'#0ea5e9', desc:'Containerized deployment — single-stage build', issues:['Image runs as root (no USER directive)'], suggestions:['Add non-root USER and multi-stage build to reduce image 3×'] },
  { id:'s3',     label:'AWS S3',            type:'storage',  color:'#f97316', desc:'Product image & PDF invoice storage', issues:[], suggestions:['Enable S3 lifecycle policy for old invoices'] },
]

const EDGES = [
  {source:'nodejs',target:'pg'},
  {source:'nodejs',target:'redis'},
  {source:'nodejs',target:'stripe'},
  {source:'nodejs',target:'sendgrid'},
  {source:'nodejs',target:'s3'},
  {source:'docker',target:'nodejs'},
]

const CHANGES = [
  { type:'split',   impact:'high',   title:'Split PaymentProcessor out of OrdersModule', reason:'OrdersModule has 145 files and handles payment logic, invoice generation, and order lifecycle — classic God Class. Extracting payment orchestration reduces coupling from 87 to ~40.', from:['OrdersModule'], to:['OrdersModule','PaymentProcessorModule'] },
  { type:'create',  impact:'medium', title:'Create InvoiceModule', reason:'Invoice PDF generation shares no business logic with order state management. Standalone module enables independent testing and versioned templates.', from:[], to:['InvoiceModule'] },
  { type:'modify',  impact:'medium', title:'Add caching layer to ProductsModule', reason:'Product catalog reads are 62% of all DB queries but change infrequently. Redis caching with 5-min TTL would reduce DB load significantly.', from:['ProductsModule'], to:['ProductsModule'] },
  { type:'modify',  impact:'low',    title:'Extract email templates to NotificationsModule', reason:'Email templates are currently duplicated in OrdersModule and NotificationsModule. Single source of truth prevents template drift.', from:['OrdersModule','NotificationsModule'], to:['NotificationsModule'] },
]

const CYCLES = [
  { path:['OrdersModule','PaymentsModule','OrdersModule'], howToFix:'Extract a shared OrderEventsService that both modules depend on, eliminating the direct circular reference. Use domain events (OrderPaid, OrderRefunded) instead of direct calls.' }
]

const ANTI_PATTERNS = [
  { name:'God Class', severity:'critical', module:'OrdersModule', desc:'OrdersService has 145 files, handles 5 distinct responsibilities, and has coupling score 87/100. Immediate split required.' },
  { name:'Feature Envy', severity:'high',  module:'OrdersModule', desc:'OrdersService calls PaymentsService 14× in a single method chain, suggesting payment logic belongs in PaymentsModule.' },
  { name:'Shotgun Surgery', severity:'medium', module:'NotificationsModule', desc:'Adding a new notification type requires changes to 6 separate files across 3 modules due to lack of a centralized template registry.' },
]

// ── Graph ─────────────────────────────────────────────────────────────────────
let cy1, cy2

window.addEventListener('DOMContentLoaded', () => {
  buildGraph()
  buildModuleList()
  buildDiff()
  buildCiclos()
  buildQualidade()
})

function buildGraph() {
  const elements = []
  NODES.forEach(n => {
    const colors = { runtime:'#10b981', database:'#3b82f6', cache:'#ef4444', external:'#a855f7', infra:'#6366f1', storage:'#f97316' }
    elements.push({ data: { id: n.id, label: n.label, color: colors[n.type] || '#6366f1', node: n } })
  })
  EDGES.forEach((e,i) => elements.push({ data: { id:'e'+i, source: e.source, target: e.target } }))

  cy1 = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: [
      { selector: 'node', style: {
        'background-color': 'data(color)', 'label': 'data(label)',
        'color': '#e2e8f0', 'font-size': 11, 'text-valign': 'bottom', 'text-margin-y': 8,
        'text-wrap': 'wrap', 'text-max-width': 80, 'font-family': 'Inter, sans-serif',
        'width': 44, 'height': 44, 'border-width': 2, 'border-color': 'rgba(255,255,255,.12)',
        'text-background-color': '#060b18', 'text-background-opacity': 0.85, 'text-background-padding': 3,
      }},
      { selector: 'edge', style: {
        'line-color': '#1e293b', 'width': 1.5, 'target-arrow-color': '#1e293b',
        'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.8
      }},
      { selector: 'node:selected', style: { 'border-color': '#6366f1', 'border-width': 3 } },
    ],
    layout: { name: 'breadthfirst', directed: true, padding: 60, spacingFactor: 1.8 },
    userZoomingEnabled: true, userPanningEnabled: true,
  })

  cy1.on('tap', 'node', e => {
    const n = e.target.data('node')
    const panel = document.getElementById('sys-panel')
    document.getElementById('panel-title').textContent = n.label.replace(/\n/g,' ')
    document.getElementById('panel-body').innerHTML = `
      <p style="color:#94a3b8;margin-bottom:12px;">${n.desc}</p>
      ${n.issues.length ? `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#ef4444;margin-bottom:8px;">Issues</div>
      ${n.issues.map(i=>`<div style="padding:7px 10px;background:#0f172a;border:1px solid rgba(239,68,68,.2);border-radius:6px;color:#fca5a5;font-size:12px;margin-bottom:6px;">${i}</div>`).join('')}` : ''}
      ${n.suggestions.length ? `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#10b981;margin-top:12px;margin-bottom:8px;">Suggestions</div>
      ${n.suggestions.map(s=>`<div style="padding:7px 10px;background:#0f172a;border:1px solid rgba(16,185,129,.2);border-radius:6px;color:#6ee7b7;font-size:12px;margin-bottom:6px;">${s}</div>`).join('')}` : ''}
    `
    panel.style.transform = 'translateX(0)'
  })

  cy1.on('tap', e => { if (e.target === cy1) closePanel() })
}

function closePanel() {
  document.getElementById('sys-panel').style.transform = 'translateX(100%)'
}

function buildGraph2() {
  if (cy2) return
  const els = [
    { data: { id:'auth2',    label:'AuthModule',    color:'#10b981' } },
    { data: { id:'orders2',  label:'OrdersModule',  color:'#f59e0b' } },
    { data: { id:'products2',label:'ProductsModule',color:'#6366f1' } },
    { data: { id:'payments2',label:'PaymentsModule',color:'#ef4444' } },
    { data: { id:'notif2',   label:'NotificationsModule',color:'#14b8a6' } },
    { data: { id:'invoice2', label:'InvoiceModule ✨', color:'#a855f7' } },
    { data: { id:'payproc2', label:'PaymentProcessor ✨', color:'#f97316' } },
    { data: { id:'inventory2',label:'InventoryModule',color:'#64748b' } },
    { data: { id:'e1', source:'orders2',  target:'payments2' } },
    { data: { id:'e2', source:'orders2',  target:'notif2' } },
    { data: { id:'e3', source:'payments2',target:'payproc2' } },
    { data: { id:'e4', source:'orders2',  target:'invoice2' } },
    { data: { id:'e5', source:'auth2',    target:'orders2' } },
    { data: { id:'e6', source:'auth2',    target:'products2' } },
    { data: { id:'e7', source:'inventory2',target:'notif2' } },
  ]
  cy2 = cytoscape({
    container: document.getElementById('cy2'),
    elements: els,
    style: [
      { selector: 'node', style: {
        'background-color': 'data(color)', 'label': 'data(label)',
        'color': '#e2e8f0', 'font-size': 11, 'text-valign': 'bottom', 'text-margin-y': 8,
        'text-wrap': 'wrap', 'text-max-width': 100, 'font-family': 'Inter, sans-serif',
        'width': 44, 'height': 44, 'border-width': 2, 'border-color': 'rgba(255,255,255,.12)',
        'text-background-color': '#060b18', 'text-background-opacity': 0.85, 'text-background-padding': 3,
      }},
      { selector: 'edge', style: {
        'line-color': '#1e293b', 'width': 1.5, 'target-arrow-color': '#1e293b',
        'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.8
      }},
    ],
    layout: { name: 'cose', padding: 60, nodeRepulsion: 8000 },
  })
}

// ── Module list ───────────────────────────────────────────────────────────────
function buildModuleList() {
  const list = document.getElementById('module-list')
  MODULES.forEach((m,i) => {
    const btn = document.createElement('button')
    btn.className = 'list-row'
    btn.id = 'mrow-'+m.id
    btn.innerHTML = `
      <div style="width:8px;height:8px;border-radius:50%;background:${m.color};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12.5px;font-weight:500;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.name}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${m.score}%;background:${m.score>70?'#10b981':m.score>50?'#f59e0b':'#ef4444'};"></div></div>
          <span style="font-size:11px;font-weight:600;color:${m.score>70?'#10b981':m.score>50?'#f59e0b':'#ef4444'};flex-shrink:0;">${m.score}</span>
        </div>
      </div>
    `
    btn.onclick = () => selectModule(m)
    list.appendChild(btn)
    if (i === 0) setTimeout(() => selectModule(m), 100)
  })
}

function selectModule(m) {
  document.querySelectorAll('.list-row').forEach(r => r.classList.remove('sel'))
  const row = document.getElementById('mrow-'+m.id)
  if (row) row.classList.add('sel')

  const detail = document.getElementById('module-detail')
  detail.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${m.color};"></div>
          <h2 style="font-size:18px;font-weight:700;color:#e2e8f0;">${m.name}</h2>
        </div>
        <div style="font-size:12px;color:#334155;margin-top:4px;">${m.files.length} source files</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:28px;font-weight:800;color:${m.score>70?'#10b981':m.score>50?'#f59e0b':'#ef4444'};">${m.score}</div>
        <div style="font-size:10px;color:#334155;text-transform:uppercase;letter-spacing:.07em;">health score</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
      ${[['Cohesion',m.cohesion,'#10b981'],['Coupling',m.coupling,m.coupling>60?'#ef4444':'#f59e0b'],['Size',Math.min(m.size,100),'#6366f1']].map(([label,val,color])=>`
      <div style="background:#0a0f1e;border:1px solid #0f172a;border-radius:8px;padding:12px;">
        <div style="font-size:10px;color:#334155;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">${label}</div>
        <div style="font-size:20px;font-weight:700;color:${color};margin-bottom:6px;">${val}</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${val}%;background:${color};"></div></div>
      </div>`).join('')}
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;margin-bottom:10px;">Responsibilities</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${m.responsibilities.map(r=>`<div style="padding:7px 11px;background:#0a0f1e;border:1px solid #0f172a;border-radius:6px;font-size:13px;color:#64748b;">${r}</div>`).join('')}
      </div>
    </div>

    ${m.deps.length ? `
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;margin-bottom:10px;">Dependencies</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${m.deps.map(d=>`<span class="chip">${d}</span>`).join('')}
      </div>
    </div>` : ''}

    <div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;margin-bottom:10px;">Source files</div>
      ${m.files.map(f=>`<div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:#475569;padding:3px 0;">${f}</div>`).join('')}
    </div>
  `
}

// ── Diff ──────────────────────────────────────────────────────────────────────
function buildDiff() {
  const colors = { split:'#6366f1', create:'#10b981', modify:'#f59e0b', remove:'#ef4444' }
  const icons  = { split:'⊘', create:'⊕', modify:'◈', remove:'⊗' }
  const container = document.getElementById('diff-list')
  CHANGES.forEach(c => {
    const card = document.createElement('div')
    card.style.cssText = 'background:#0a0f1e;border:1px solid #0f172a;border-radius:10px;padding:18px 20px;'
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="background:${colors[c.type]}22;color:${colors[c.type]};padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">${icons[c.type]} ${c.type}</span>
        <span style="background:${c.impact==='high'?'#ef444422':c.impact==='medium'?'#f59e0b22':'#6366f122'};color:${c.impact==='high'?'#fca5a5':c.impact==='medium'?'#fcd34d':'#a5b4fc'};padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;">${c.impact} impact</span>
      </div>
      <div style="font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:8px;">${c.title}</div>
      <div style="font-size:13px;color:#64748b;line-height:1.65;margin-bottom:12px;">${c.reason}</div>
      ${c.from.length || c.to.length ? `
      <div style="display:flex;align-items:center;gap:12px;font-size:12px;">
        ${c.from.length ? `<div style="color:#334155;">From: ${c.from.map(f=>`<span style="color:#64748b;">${f}</span>`).join(', ')}</div>` : ''}
        ${c.from.length && c.to.length ? '<div style="color:#0f172a;">→</div>' : ''}
        ${c.to.length ? `<div style="color:#334155;">To: ${c.to.map(t=>`<span style="color:#818cf8;">${t}</span>`).join(', ')}</div>` : ''}
      </div>` : ''}
    `
    container.appendChild(card)
  })
}

// ── Ciclos ────────────────────────────────────────────────────────────────────
function buildCiclos() {
  document.getElementById('ciclos-content').innerHTML = `
    <div style="max-width:680px;">
      <div style="margin-bottom:20px;">
        <div style="font-size:13px;font-weight:700;color:#ef4444;margin-bottom:4px;">1 circular dependency detected</div>
        <div style="font-size:13px;color:#475569;">Circular dependencies make it impossible to isolate and test modules independently, and cause order-of-initialization bugs.</div>
      </div>
      ${CYCLES.map(c => `
      <div style="background:#0a0f1e;border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:18px 20px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          ${c.path.map((p,i) => `
            <span style="padding:4px 12px;border-radius:6px;font-size:12.5px;font-weight:600;background:${i===c.path.length-1?'rgba(239,68,68,.15)':'#0f172a'};color:${i===c.path.length-1?'#fca5a5':'#94a3b8'};border:1px solid ${i===c.path.length-1?'rgba(239,68,68,.3)':'#1e293b'};">${p}</span>
            ${i < c.path.length-1 ? '<span style="color:#334155;font-size:14px;">→</span>' : ''}
          `).join('')}
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;margin-bottom:8px;">How to fix</div>
        <div style="font-size:13px;color:#64748b;line-height:1.65;">${c.howToFix}</div>
      </div>`).join('')}
    </div>
  `
}

// ── Qualidade ─────────────────────────────────────────────────────────────────
function buildQualidade() {
  document.getElementById('qual-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start;max-width:960px;">
      <div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;margin-bottom:14px;">Anti-patterns</div>
        ${ANTI_PATTERNS.map(ap => `
        <div style="background:#0a0f1e;border:1px solid #0f172a;border-radius:8px;padding:14px 16px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:${ap.severity==='critical'?'rgba(239,68,68,.15)':ap.severity==='high'?'rgba(245,158,11,.12)':'rgba(99,102,241,.12)'};color:${ap.severity==='critical'?'#fca5a5':ap.severity==='high'?'#fcd34d':'#a5b4fc'};">${ap.severity}</span>
            <span style="font-size:13px;font-weight:600;color:#e2e8f0;">${ap.name}</span>
          </div>
          <div style="font-size:12px;color:#334155;margin-bottom:4px;">${ap.module}</div>
          <div style="font-size:12.5px;color:#64748b;line-height:1.55;">${ap.desc}</div>
        </div>`).join('')}
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;margin-bottom:14px;">Module scores — worst first</div>
        ${[...MODULES].sort((a,b)=>a.score-b.score).map(m => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #0a0f1e;">
          <div style="width:8px;height:8px;border-radius:50%;background:${m.color};flex-shrink:0;"></div>
          <div style="font-size:12.5px;color:#64748b;flex:1;">${m.name}</div>
          <div class="score-bar-track" style="width:80px;"><div class="score-bar-fill" style="width:${m.score}%;background:${m.score>70?'#10b981':m.score>50?'#f59e0b':'#ef4444'};"></div></div>
          <div style="font-size:12px;font-weight:600;color:${m.score>70?'#10b981':m.score>50?'#f59e0b':'#ef4444'};width:24px;text-align:right;">${m.score}</div>
        </div>`).join('')}
      </div>
    </div>
  `
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  document.getElementById('tab-'+name).classList.add('active')
  const view = document.getElementById('view-'+name)
  view.classList.add('active')
  if (name === 'suggested') buildGraph2()
  if (name === 'sistema' && cy1) setTimeout(() => cy1.resize(), 50)
  if (name === 'suggested' && cy2) setTimeout(() => cy2.resize(), 50)
}
</script>
